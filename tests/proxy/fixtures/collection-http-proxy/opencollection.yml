opencollection: 1.0.0

info:
  name: collection_with_http_proxy
config:
  proxy:
    inherit: false
    config:
      protocol: http
      hostname: 127.0.0.1
      port: 8090
      auth:
        username: user
        password: password
      bypassProxy: ""
  clientCertificates:
    - domain: 127.0.0.1
      type: pkcs12
      pkcs12FilePath: ../../server/certs/client.p12
      passphrase: bruno-test
    - domain: host.docker.internal
      type: pkcs12
      pkcs12FilePath: ../../server/certs/client.p12
      passphrase: bruno-test
    - domain: client.badssl.com
      type: pkcs12
      pkcs12FilePath: ../../server/certs/badssl-client.p12
      passphrase: badssl.com
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
