info:
  name: http
  type: http
  seq: 1

http:
  method: GET
  url: http://{{host}}:8070
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        console.log(process.env.http_proxy);
        console.log(process.env.https_proxy);
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
