http_port 8090
https_port 8091 cert=@SQUID_CERT@

# Basic authentication
auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/htpasswd
auth_param basic realm Bruno Proxy
acl authenticated proxy_auth REQUIRED

# ACLs
acl localnet src 192.168.0.0/16
acl dockernet src 172.0.0.0/8
acl CONNECT method CONNECT

# Require auth for all access
http_access allow authenticated
http_access deny all

# Log format: timestamp | client IP:port | method target | status | TLS client↔proxy | TLS proxy↔server | duration
logformat bruno %{%Y-%m-%dT%H:%M:%S}tl [%>a:%>p] %rm %ru | status=%>Hs | tls_in=%ssl::>negotiated_version/%ssl::>negotiated_cipher | tls_out=%ssl::<negotiated_version/%ssl::<negotiated_cipher | %trms

access_log stdio:/var/log/squid/access.log bruno
cache_log /dev/null
cache_store_log none
cache deny all
