name: 'Run Proxy Tests - Windows'
description: 'Run Playwright proxy integration tests on Windows'
runs:
  using: 'composite'
  steps:
    - name: Run proxy tests
      shell: pwsh
      run: |
        npm run test:e2e:proxy

    - name: Upload Playwright report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-proxy-e2e-windows
        path: playwright-report/
        retention-days: 30
