name: 'Run Proxy Tests - Macos'
description: 'Run Playwright proxy integration tests on Macos'
runs:
  using: 'composite'
  steps:
    - name: Run proxy tests
      shell: bash
      run: |
        set -euo pipefail
        npm run test:e2e:proxy

    - name: Upload Playwright report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-proxy-e2e-macos
        path: playwright-report/
        retention-days: 30
