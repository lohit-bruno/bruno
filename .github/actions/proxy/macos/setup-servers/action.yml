name: 'Setup Proxy Test Servers - macOS'
description: 'Start HTTP, HTTPS, and Squid proxy servers for proxy tests on macOS'
runs:
  using: 'composite'
  steps:
    - name: Start all proxy test servers
      shell: bash
      run: |
        # macOS Squid 7 needs FD limit cap
        ulimit -n 4096
        node tests/proxy/server/index.js > /tmp/proxy-servers.log 2>&1 &
        echo "Proxy servers starting (PID $!)..."

        # Wait for health checks to complete (index.js logs "All servers ready!")
        for i in $(seq 1 60); do
          if grep -q "All servers ready" /tmp/proxy-servers.log 2>/dev/null; then
            echo "All proxy test servers are ready"
            exit 0
          fi
          if grep -q "FATAL" /tmp/proxy-servers.log 2>/dev/null; then
            echo "Server setup failed:"
            cat /tmp/proxy-servers.log
            exit 1
          fi
          sleep 2
        done
        echo "Timed out waiting for servers:"
        cat /tmp/proxy-servers.log
        exit 1
