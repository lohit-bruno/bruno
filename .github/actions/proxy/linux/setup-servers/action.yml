name: 'Setup Proxy Test Servers - Linux'
description: 'Start HTTP, HTTPS, and Squid proxy servers for proxy tests on Linux'
runs:
  using: 'composite'
  steps:
    - name: Stop existing squid
      shell: bash
      run: |
        sudo systemctl stop squid 2>/dev/null || true
        sudo killall -9 squid 2>/dev/null || true
        sleep 2
        sudo rm -f /run/squid.pid

    - name: Ensure log dir is writable
      shell: bash
      run: |
        sudo mkdir -p /var/log/squid
        sudo chown -R proxy:proxy /var/log/squid 2>/dev/null || true
        sudo chmod -R 777 /var/log/squid
        sudo chmod -R o+rX "$(pwd)/tests/proxy/server/certs" 2>/dev/null || true

    - name: Start all proxy test servers
      shell: bash
      run: |
        node tests/proxy/server/index.js > /tmp/proxy-servers.log 2>&1 &
        echo "Proxy servers starting (PID $!)..."

        # Wait for health checks to complete
        for i in $(seq 1 60); do
          if grep -q "All servers ready" /tmp/proxy-servers.log 2>/dev/null; then
            echo "All proxy test servers are ready"
            exit 0
          fi
          if grep -q "FATAL" /tmp/proxy-servers.log 2>/dev/null; then
            echo "Server setup failed:"
            cat /tmp/proxy-servers.log
            exit 1
          fi
          sleep 2
        done
        echo "Timed out waiting for servers:"
        cat /tmp/proxy-servers.log
        exit 1
