name: 'Setup Proxy Test Servers - Linux'
description: 'Generate certs and start HTTP, HTTPS, and Squid proxy servers for proxy tests on Linux'
runs:
  using: 'composite'
  steps:
    - name: Start HTTP server
      shell: bash
      run: |
        set -euo pipefail
        node tests/proxy/server/http-server.js &
        echo "HTTP server started (PID $!)"

    - name: Wait for HTTP server
      shell: bash
      run: |
        set -euo pipefail
        echo "Waiting for HTTP server on :8070..."
        for i in $(seq 1 30); do
          curl -sf http://localhost:8070/ > /dev/null && echo "HTTP server ready" && exit 0
          sleep 2
        done
        echo "HTTP server did not become ready" && exit 1

    - name: Generate HTTPS server certificate
      shell: bash
      run: |
        set -euo pipefail
        CERT_DIR="$(pwd)/tests/proxy/server/certs"
        mkdir -p "$CERT_DIR"

        openssl req -x509 -newkey rsa:2048 \
          -keyout "$CERT_DIR/server.key" \
          -out "$CERT_DIR/server.crt" \
          -days 3650 -nodes \
          -subj "/CN=localhost" \
          -addext "subjectAltName=IP:127.0.0.1,DNS:localhost,DNS:host.docker.internal" 2>/dev/null

        openssl x509 -in "$CERT_DIR/server.crt" -out "$CERT_DIR/server.pem" -outform PEM
        echo "HTTPS server cert written to $CERT_DIR"

    - name: Generate client certificate for mTLS tests
      shell: bash
      run: |
        set -euo pipefail
        CERT_DIR="$(pwd)/tests/proxy/server/certs"

        # Client CA
        openssl req -x509 -newkey rsa:2048 \
          -keyout "$CERT_DIR/client-ca.key" \
          -out "$CERT_DIR/client-ca.crt" \
          -days 3650 -nodes \
          -subj "/CN=Bruno Test Client CA" 2>/dev/null

        # Client cert signed by client CA
        openssl req -newkey rsa:2048 \
          -keyout "$CERT_DIR/client.key" \
          -out "$CERT_DIR/client.csr" \
          -nodes -subj "/CN=Bruno Test Client" 2>/dev/null

        openssl x509 -req \
          -in "$CERT_DIR/client.csr" \
          -CA "$CERT_DIR/client-ca.crt" \
          -CAkey "$CERT_DIR/client-ca.key" \
          -CAcreateserial \
          -out "$CERT_DIR/client.crt" \
          -days 3650 2>/dev/null

        # PKCS12 bundle for Bruno client cert config
        openssl pkcs12 -export \
          -out "$CERT_DIR/client.p12" \
          -inkey "$CERT_DIR/client.key" \
          -in "$CERT_DIR/client.crt" \
          -certpbe PBE-SHA1-3DES -keypbe PBE-SHA1-3DES -macalg sha1 \
          -passout pass:bruno-test

        # Empty CA cert file (needed by ca=[] regression test)
        touch "$CERT_DIR/empty-ca.pem"

        echo "Client cert written to $CERT_DIR"

    - name: Start HTTPS server
      shell: bash
      run: |
        set -euo pipefail
        CERT_DIR="$(pwd)/tests/proxy/server/certs" \
          node tests/proxy/server/https-server.js &
        echo "HTTPS server started (PID $!)"

    - name: Start HTTPS client-cert server
      shell: bash
      run: |
        set -euo pipefail
        CERT_DIR="$(pwd)/tests/proxy/server/certs" \
          node tests/proxy/server/https-client-cert-server.js &
        echo "HTTPS client-cert server started (PID $!)"

    - name: Wait for HTTPS server
      shell: bash
      run: |
        set -euo pipefail
        CERT_DIR="$(pwd)/tests/proxy/server/certs"
        echo "Waiting for HTTPS server on :8071..."
        for i in $(seq 1 30); do
          curl -sf --cacert "$CERT_DIR/server.pem" https://localhost:8071/ > /dev/null \
            && echo "HTTPS server ready" && exit 0
          sleep 2
        done
        echo "HTTPS server did not become ready" && exit 1

    - name: Wait for HTTPS client-cert server
      shell: bash
      run: |
        set -euo pipefail
        CERT_DIR="$(pwd)/tests/proxy/server/certs"
        echo "Waiting for HTTPS client-cert server on :8072..."
        for i in $(seq 1 30); do
          curl -sf --cacert "$CERT_DIR/server.pem" \
            --cert "$CERT_DIR/client.crt" --key "$CERT_DIR/client.key" \
            https://localhost:8072/ > /dev/null \
            && echo "HTTPS client-cert server ready" && exit 0
          sleep 2
        done
        echo "HTTPS client-cert server did not become ready" && exit 1

    - name: Generate Squid proxy certificate
      shell: bash
      run: |
        set -euo pipefail
        SQUID_CERT_DIR="$(pwd)/tests/proxy/server/certs"
        mkdir -p "$SQUID_CERT_DIR"

        openssl req -x509 -newkey rsa:2048 \
          -keyout "$SQUID_CERT_DIR/squid.key" \
          -out "$SQUID_CERT_DIR/squid.crt" \
          -days 3650 -nodes \
          -subj "/CN=squid-proxy" \
          -addext "subjectAltName=IP:127.0.0.1,DNS:localhost" 2>/dev/null

        # Squid https_port expects key + cert in a single PEM file
        cat "$SQUID_CERT_DIR/squid.key" "$SQUID_CERT_DIR/squid.crt" > "$SQUID_CERT_DIR/squid.pem"
        echo "Squid cert written to $SQUID_CERT_DIR"

    - name: Create Squid htpasswd and config
      shell: bash
      run: |
        set -euo pipefail

        # Create htpasswd for basic auth
        sudo mkdir -p /etc/squid
        sudo htpasswd -bc /etc/squid/htpasswd user password
        echo "htpasswd created (user:password)"

        # Find the basic_ncsa_auth helper
        NCSA_AUTH=$(find /usr -name "basic_ncsa_auth" -type f 2>/dev/null | head -1)
        if [ -z "$NCSA_AUTH" ]; then
          echo "ERROR: basic_ncsa_auth not found" && exit 1
        fi
        echo "Found basic_ncsa_auth at: $NCSA_AUTH"

        SQUID_CERT="$(pwd)/tests/proxy/server/certs/squid.pem"
        SQUID_CONF="/tmp/squid-bruno.conf"

        # Replace placeholders in squid.conf
        sed -e "s|@SQUID_CERT@|$SQUID_CERT|g" \
            -e "s|/usr/lib/squid/basic_ncsa_auth|$NCSA_AUTH|g" \
          tests/proxy/server/squid.conf > "$SQUID_CONF"

        # Ensure Squid can resolve "localhost" from the hosts file
        echo "hosts_file /etc/hosts" >> "$SQUID_CONF"

        echo "Squid config written to $SQUID_CONF"

        cat "$SQUID_CONF"

    - name: Start Squid proxy
      shell: bash
      run: |
        set -euo pipefail

        squid -z --foreground 2>/dev/null || true

        rm -f /run/squid.pid

        # Ensure log dir is writable by the 'proxy' user (squid's cache_effective_user)
        sudo chown -R proxy:proxy /var/log/squid
        sudo touch /var/log/squid/access.log && sudo chmod 666 /var/log/squid/access.log
        tail -f /var/log/squid/access.log &

        sudo squid -N -f /tmp/squid-bruno.conf &

        echo "Squid started (PID $!)"

    - name: Wait for Squid HTTP proxy
      shell: bash
      run: |
        set -euo pipefail
        echo "Waiting for Squid HTTP proxy on :8090..."
        for i in $(seq 1 30); do
          curl -sf --proxy http://user:password@127.0.0.1:8090 http://localhost:8070/ > /dev/null \
            && echo "Squid HTTP proxy ready" && exit 0
          sleep 2
        done
        echo "Squid HTTP proxy did not become ready" && exit 1

    - name: Wait for Squid HTTPS proxy
      shell: bash
      run: |
        set -euo pipefail
        SQUID_CERT_DIR="$(pwd)/tests/proxy/server/certs"
        echo "Waiting for Squid HTTPS proxy on :8091..."
        for i in $(seq 1 30); do
          curl -sf \
            --proxy https://user:password@127.0.0.1:8091 \
            --proxy-cacert "$SQUID_CERT_DIR/squid.pem" \
            http://localhost:8070/ > /dev/null \
            && echo "Squid HTTPS proxy ready" && exit 0
          sleep 2
        done
        echo "Squid HTTPS proxy did not become ready" && exit 1

    - name: Create CA bundle (server + squid proxy certs)
      shell: bash
      run: |
        set -euo pipefail
        CERT_DIR="$(pwd)/tests/proxy/server/certs"
        SQUID_CERT_DIR="$(pwd)/tests/proxy/server/certs"
        BUNDLE="$CERT_DIR/ca-bundle.pem"

        # Combine HTTPS server cert and Squid proxy cert into a single CA bundle
        cat "$CERT_DIR/server.pem" > "$BUNDLE"
        cat "$SQUID_CERT_DIR/squid.crt" >> "$BUNDLE"
        echo "CA bundle written to $BUNDLE"
