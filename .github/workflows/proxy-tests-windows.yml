name: Proxy tests windows
on:
  workflow_dispatch:

jobs:
  tests-for-windows:
    name: Proxy Tests - Windows
    timeout-minutes: 30
    runs-on: windows_self_hosted_github_actions_runner
    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          choco install squid --no-progress -y

          # Install cygcrypt-2.dll needed by Squid's basic_ncsa_auth helper
          # (the choco Squid package is Cygwin-based but doesn't include this DLL)
          if (!(Test-Path "C:\Squid\bin\cygcrypt-2.dll")) {
            Write-Host "Installing cygcrypt-2.dll from Cygwin mirror..."
            $pkg = "$env:TEMP\libcrypt2.tar.xz"
            $extractDir = "$env:TEMP\libcrypt2"
            Invoke-WebRequest -Uri "https://mirrors.kernel.org/sourceware/cygwin/x86_64/release/libxcrypt/libcrypt2/libcrypt2-4.4.68-1.tar.xz" -OutFile $pkg -UseBasicParsing
            New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
            tar -xf $pkg -C $extractDir
            $dll = Get-ChildItem $extractDir -Recurse -Filter "cygcrypt-2.dll" | Select-Object -First 1
            if ($dll) {
              Copy-Item $dll.FullName "C:\Squid\bin\" -Force
              Write-Host "Installed cygcrypt-2.dll to C:\Squid\bin\"
            } else {
              Write-Host "WARNING: cygcrypt-2.dll not found in downloaded package"
            }
          }

          # Add Squid bin to PATH for all subsequent steps
          if (Test-Path "C:\Squid\bin") {
            echo "C:\Squid\bin" >> $env:GITHUB_PATH
          }

      - name: Setup Node Dependencies
        uses: ./.github/actions/common/setup-node-deps
        with:
          shell: pwsh

      - name: Kill leftover processes
        shell: pwsh
        run: |
          Stop-Service squid -ErrorAction SilentlyContinue
          Get-Process -Name node, squid -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          foreach ($port in @(8070, 8071, 8072, 8090, 8091)) {
            $pids = netstat -ano | Select-String ":$port\s.*LISTENING" | ForEach-Object { ($_ -split '\s+')[-1] } | Sort-Object -Unique
            foreach ($pid in $pids) { if ($pid -and $pid -ne "0") { Stop-Process -Id $pid -Force -ErrorAction SilentlyContinue } }
          }
          @("C:\Squid\var\run\squid.pid", "C:\var\run\squid.pid") | ForEach-Object { if (Test-Path $_) { Remove-Item $_ -Force -ErrorAction SilentlyContinue } }
          Start-Sleep 1

      - name: Setup servers
        shell: pwsh
        run: |
          $env:HOST = "0.0.0.0"
          $logFile = "$env:TEMP\proxy-servers.log"
          Start-Process -FilePath "node" -ArgumentList "tests\proxy\server\index.js" -NoNewWindow -RedirectStandardOutput $logFile -RedirectStandardError "$env:TEMP\proxy-servers-err.log"
          Write-Host "Proxy servers starting..."

          # Wait for health checks to complete
          for ($i = 1; $i -le 60; $i++) {
            if (Test-Path $logFile) {
              $content = Get-Content $logFile -Raw -ErrorAction SilentlyContinue
              if ($content -match "All servers ready") {
                Write-Host "All proxy test servers are ready"
                exit 0
              }
              if ($content -match "FATAL") {
                Write-Host "Server setup failed:"
                Get-Content $logFile
                exit 1
              }
            }
            Start-Sleep 2
          }
          Write-Host "Timed out waiting for servers:"
          if (Test-Path $logFile) { Get-Content $logFile }
          if (Test-Path "$env:TEMP\proxy-servers-err.log") { Get-Content "$env:TEMP\proxy-servers-err.log" }
          exit 1

      - name: Run Proxy CLI Tests
        uses: ./.github/actions/proxy/windows/run-proxy-cli-tests

      - name: Debug diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          Write-Host "=== Listening Ports (8070-8072, 8090-8091) ==="
          netstat -ano | Select-String "LISTENING" | Select-String "807|809"

          Write-Host "`n=== Running Processes ==="
          Get-Process -Name node,squid -ErrorAction SilentlyContinue | Format-Table Id, ProcessName, StartTime, Path

          Write-Host "`n=== Server Log ==="
          if (Test-Path "$env:TEMP\proxy-servers.log") { Get-Content "$env:TEMP\proxy-servers.log" -Tail 50 }

          Write-Host "`n=== Server Error Log ==="
          if (Test-Path "$env:TEMP\proxy-servers-err.log") { Get-Content "$env:TEMP\proxy-servers-err.log" -Tail 50 }

          Write-Host "`n=== curl test HTTP ==="
          curl.exe -v http://127.0.0.1:8070/ 2>&1
